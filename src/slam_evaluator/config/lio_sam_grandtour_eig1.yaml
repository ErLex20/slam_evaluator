# LIO-SAM on the ETH GrandTour dataset (merged ROS2 bag replay),
# Hesai XT-32 on the EIG-1 mission.
#
# Bag topics used by the launch:
#   /boxi/hesai/points_undistorted       sensor_msgs/PointCloud2
#   /boxi/stim320/imu                    sensor_msgs/Imu
#   /anymal/state_estimator/odometry     nav_msgs/Odometry
#   /boxi/inertial_explorer/tc/odometry  nav_msgs/Odometry (ground truth)
#   /tf_static                           sensor extrinsics
# The bag adapter republishes normalized ANYmal odometry on
# /slam_evaluator/grandtour/odometry and broadcasts odom -> base.
#
# The launch file adds a static identity map -> odom to complete the tree
# (mirrors IILABS3D's map -> eve/odom anchor).
#
# sensor.range values are a first pass for the Hesai XT-32 (medium-range
# 32-channel mechanical lidar, ~100 m in typical conditions) and are NOT
# empirically tuned against this dataset yet - adjust if the map looks
# truncated (raise max) or shows robot self-returns (raise min).

/dua_tf_server:
  ros__parameters:
    dua:
      tf_server:
        get_transform: false
        transform_pose: false
        wait_servers: false
    fixed_frame: map
    poses_pub_period: 50
    source_frames:
      - base
    target_frames:
      - map
    use_sim_time: true

