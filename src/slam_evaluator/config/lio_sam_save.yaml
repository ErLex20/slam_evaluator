/dua_tf_server:
  ros__parameters:
    dua:
      tf_server:
        get_transform: false
        transform_pose: false
        wait_servers: false
    fixed_frame: map
    poses_pub_period: 50
    source_frames:
      - marco/base_link
    target_frames:
      - map
    use_sim_time: true

/lio_sam:
  ros__parameters:
    autostart: true
    cpu:
      feature_extraction:
        cores: 4
        cpu_set: [0, 1, 2, 3]
      map_optimization:
        cores: 4
        cpu_set: [4, 5, 6, 7]
      loop_closure:
        cores: 4
        cpu_set: [8, 9, 10, 11]
    debug:
      features:
        edges: true
        surfaces: true
        normals: true
      loop_closure:
        correspondences: true
        scan: true
      mapping:
        all_points: true
        normals: true
        path: true
    dua:
      tf_server:
        get_transform: true
        transform_pose: false
        wait_servers: true
    features:
      k_neighbors: 5
      size:
        ivox: 0.2
        leaf: 0.1
    loop_closure:
      correction:
        thr:
          translation: 0.01
          rotation: 0.02
    mapping:
      global_map:
        initial_pose: [0.0, 0.0, 0.0775, 0.0, -0.0899319, 3.14159]
        leaf_size: 0.01
        path: ""
        pose_density: 1.0
        search_radius: 100.0
        set_pose: true
      history_keyframe:
        fitness_score: 0.3
        search_num: 30
        search_radius: 10.0
        search_time_diff: 60.0
      leaf_size:
        edge: 0.2
        surface: 0.2
      min:
        edge: 10
        surface: 100
      optimization:
        search_radius:
          edge: 0.5
          surface: 1.0
        degeneracy_threshold: 0.0
      surrounding_keyframe:
        adding_threshold:
          angle: 0.5
          distance: 0.5
        density: 1.0
        search_radius: 30.0
    pose_fix:
      threshold:
        covariance: 1.0
        distance: 5.0
      use_elevation: true
    sensor:
      range:
        max: 50.0
        min: 0.5
    tf:
      frame:
        global: "map"
        local: "marco/odom"
      prefix: "marco/"
      publish: false
    use_sim_time: true
    verbose: false

/ekf_global:
  ros__parameters:
    autostart: true
    use_sim_time: true
    verbose: false
    worker_cpu: 3
    dua:
      tf_server:
        get_transform: true
        transform_pose: false
        wait_servers: true

    filter_type: ekf

    # Only for ukf
    # params:
    #   alpha: 0.001
    #   beta: 2.0
    #   kappa: 0.0

